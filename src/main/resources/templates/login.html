<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>
<body>

<h2>ログイン</h2>

<form th:action="@{/login}" method="post">
    <div>
        <label>ユーザー名：</label>
        <input type="text" name="username" />
    </div>

    <div>
        <label>パスワード：</label>
        <input type="password" name="password" />
    </div>

    <div>
        <button type="submit">ログイン</button>
    </div>
</form>

<p th:if="${param.error}">
    ログインに失敗しました
</p>

<p th:if="${param.logout}">
    ログアウトしました
</p>

</body>
</html>
